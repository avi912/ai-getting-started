name: Claude Node example CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  run-claude-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install
        run: npm ci
        working-directory: examples/claude-node
      - name: Run Claude Node example
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
        run: node index.mjs
        working-directory: examples/claude-node
